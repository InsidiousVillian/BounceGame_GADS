<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui-overlay">
    <div id="hud">
      <div class="bar-group">
        <label>VIBE</label>
        <div class="bar-track"><div id="vibe-bar" class="bar vibe"></div></div>
      </div>
      <div class="bar-group chaos-bar-group" id="chaos-bar-wrap">
        <label>CHAOS</label>
        <div class="bar-track"><div id="chaos-bar" class="bar chaos"></div></div>
      </div>
    </div>

    <div id="bouncer-station" aria-label="Bouncer station door">
      <span class="station-label">Bouncer Station</span>
    </div>

    <div id="inspection-menu" class="hidden" role="dialog" aria-modal="true" aria-labelledby="inspection-title">
      <div class="inspection-folder">
        <div class="folder-tab" id="inspection-title">ENTRY DOSSIER</div>
        <div class="folder-body">
          <div class="folder-clip" aria-hidden="true"></div>
          <div class="folder-paper-texture"></div>
          <div class="inspection-fields">
            <div class="field-block">
              <span class="field-label field-label--neon">Name</span>
              <p class="field-value" id="inspect-name">—</p>
            </div>
            <div class="field-block">
              <span class="field-label field-label--neon">Age</span>
              <p class="field-value" id="inspect-age">—</p>
            </div>
            <div class="field-block">
              <span class="field-label field-label--neon">ID Validity</span>
              <p class="field-value" id="inspect-id-validity">—</p>
            </div>
            <div class="field-block">
              <span class="field-label field-label--neon">Reason for Entry</span>
              <p class="field-value field-value--multiline" id="inspect-reason">—</p>
            </div>
          </div>
          <div class="inspection-actions">
            <button type="button" class="btn-neon btn-let-in" id="btn-let-in">Let In</button>
            <button type="button" class="btn-neon btn-deny" id="btn-deny">Deny</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="NPCSystem.js"></script>
  <script src="game.js"></script>
</body>
</html>
